version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: iycyachts-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: iycyachts
      MYSQL_USER: yacht_user
      MYSQL_PASSWORD: yacht_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: iycyachts-app
    environment:
      DATABASE_URL: "mysql://yacht_user:yacht_password@mysql:3306/iycyachts"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "change-me-in-production"
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  mysql_data:
